<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍕 Family Pizza - Order</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .pizza-option { transition: all 0.2s; }
    .pizza-option.active { border-color: #dc2626; background-color: #fee2e2; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Password Screen -->
  <div id="password-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-xs w-full mx-4 text-center">
      <h1 class="text-3xl mb-2">🍕</h1>
      <h2 class="text-2xl font-bold mb-6">Hometown Pizza Test App</h2>
      <input type="password" id="password-input" 
             class="w-full px-5 py-4 border rounded-2xl text-center text-lg mb-4"
             placeholder="Enter test password">
      <button onclick="checkPassword()" 
              class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-semibold text-lg">
        Enter Test App
      </button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="hidden max-w-md mx-auto bg-white min-h-screen">
    
    <!-- Header -->
    <div class="bg-red-600 text-white p-5 sticky top-0 z-10">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold">Hometown Pizza</h1>
          <p class="text-red-100 text-sm">Test App</p>
        </div>
        <div id="cart-count" class="bg-white text-red-600 w-8 h-8 flex items-center justify-center rounded-full font-bold">0</div>
      </div>
    </div>

    <div class="p-5">
      <h2 class="text-2xl font-bold mb-1">Build Your Pizza</h2>
      <p class="text-gray-600">Step by Step</p>

      <!-- Size -->
      <div class="mt-8">
        <h3 class="font-semibold mb-3">1. Size</h3>
        <div class="grid grid-cols-2 gap-3">
          <div onclick="selectSize(this, 18.99)" class="pizza-option border-2 border-gray-300 rounded-2xl p-4 text-center cursor-pointer">
            <p class="font-bold">Large</p>
            <p class="text-2xl font-semibold">$18.99</p>
          </div>
          <div onclick="selectSize(this, 14.99)" class="pizza-option border-2 border-gray-300 rounded-2xl p-4 text-center cursor-pointer">
            <p class="font-bold">Medium</p>
            <p class="text-2xl font-semibold">$14.99</p>
          </div>
        </div>
      </div>

      <div class="text-center mt-12 text-gray-400 text-sm">
        More steps (sauce, toppings, cart) coming in next update...
      </div>
    </div>
  </div>

  <script>
    const CORRECT_PASSWORD = "pizza2026";

    function checkPassword() {
      if (document.getElementById("password-input").value === CORRECT_PASSWORD) {
        document.getElementById("password-screen").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
      } else {
        alert("Wrong password");
      }
    }

    // Allow Enter key
    document.getElementById("password-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") checkPassword();
    });

    // Simple size selection
    function selectSize(element, price) {
      document.querySelectorAll('.pizza-option').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      console.log("Selected size - $" + price);
    }
  </script>
</body>
</html>
