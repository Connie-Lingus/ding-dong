<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍕 Hometown Pizza - Build Your Own</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .step { display: none; }
    .step.active { display: block; }
    .topping-card { transition: all 0.2s; }
    .topping-card.active { border-color: #dc2626; background-color: #fee2e2; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Password Screen -->
  <div id="password-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-xs w-full mx-4 text-center">
      <h1 class="text-4xl mb-2">🍕</h1>
      <h2 class="text-2xl font-bold mb-6">Hometown Pizza</h2>
      <h3 class="text-xl text-gray-600 mb-6">Test App</h3>
      <input type="password" id="password-input" class="w-full px-5 py-4 border rounded-2xl text-center text-lg mb-4" placeholder="Enter test password">
      <button onclick="checkPassword()" class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-semibold text-lg">Enter Test App</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="hidden max-w-md mx-auto bg-white min-h-screen">

    <!-- Header -->
    <div class="bg-red-600 text-white p-5 sticky top-0 z-10">
      <div class="flex justify-between items-center">
        <h1 class="text-3xl font-bold">Hometown Pizza</h1>
        <div class="text-right">
          <div id="total-price" class="text-lg font-bold">$14.95</div>
          <div class="text-xs text-red-100">Large • Build Your Own</div>
        </div>
      </div>
    </div>

    <div class="p-5">
      <h2 class="text-2xl font-bold mb-6">Build Your Own Pizza</h2>

      <!-- Progress -->
      <div class="flex justify-between text-xs mb-6 text-gray-500">
        <div onclick="goToStep(1)" class="cursor-pointer" id="step1-tab">1. Size</div>
        <div onclick="goToStep(2)" class="cursor-pointer" id="step2-tab">2. Crust</div>
        <div onclick="goToStep(3)" class="cursor-pointer" id="step3-tab">3. Toppings</div>
      </div>

      <!-- Step 1: Size -->
      <div id="step-1" class="step active">
        <h3 class="font-semibold mb-4">1. Choose Size</h3>
        <div class="grid grid-cols-2 gap-3">
          <div onclick="selectSize(this, 14.95)" class="pizza-option border-2 border-gray-300 rounded-2xl p-5 text-center cursor-pointer">
            <p class="font-bold">Medium</p>
            <p class="text-2xl font-semibold">$14.95</p>
          </div>
          <div onclick="selectSize(this, 18.95)" class="pizza-option border-2 border-red-500 rounded-2xl p-5 text-center cursor-pointer active">
            <p class="font-bold">Large <span class="text-red-600">(Most Popular)</span></p>
            <p class="text-2xl font-semibold">$18.95</p>
          </div>
        </div>
      </div>

      <!-- Step 2: Crust -->
      <div id="step-2" class="step">
        <h3 class="font-semibold mb-4">2. Choose Crust</h3>
        <div class="space-y-3">
          <div onclick="selectCrust(this, 'Original')" class="pizza-option border-2 border-gray-300 rounded-2xl p-5 cursor-pointer">Original Hand-Tossed</div>
          <div onclick="selectCrust(this, 'Thin')" class="pizza-option border-2 border-gray-300 rounded-2xl p-5 cursor-pointer">Thin & Crispy</div>
        </div>
      </div>

      <!-- Step 3: Toppings -->
      <div id="step-3" class="step">
        <h3 class="font-semibold mb-4">3. Add Toppings</h3>
        <p class="text-sm text-gray-600 mb-4">Tap to add • Tap again for Extra</p>
        <div id="toppings-list" class="grid grid-cols-2 gap-3">
          <!-- Toppings will be populated by JS -->
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4 flex gap-3">
      <button onclick="prevStep()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-semibold">Back</button>
      <button onclick="nextStep()" id="next-btn" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-semibold">Next</button>
    </div>
  </div>

  <script>
    const CORRECT_PASSWORD = "pizza2026";
    let currentStep = 1;
    let order = {
      size: "Large",
      sizePrice: 18.95,
      crust: "Original",
      toppings: []
    };

    const toppingsData = [
      {name: "Pepperoni", price: 2.50},
      {name: "Sausage", price: 2.50},
      {name: "Mushrooms", price: 1.75},
      {name: "Onions", price: 1.50},
      {name: "Bell Peppers", price: 1.75},
      {name: "Black Olives", price: 1.75},
      {name: "Bacon", price: 2.75},
      {name: "Ham", price: 2.50},
      {name: "Jalapeños", price: 1.75},
      {name: "Extra Cheese", price: 2.00}
    ];

    function checkPassword() {
      if (document.getElementById("password-input").value === CORRECT_PASSWORD) {
        document.getElementById("password-screen").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
        renderToppings();
      } else {
        alert("Wrong password");
      }
    }

    function renderToppings() {
      const container = document.getElementById("toppings-list");
      container.innerHTML = "";
      toppingsData.forEach((topping, index) => {
        const div = document.createElement("div");
        div.className = "topping-card border-2 border-gray-300 rounded-2xl p-4 text-center cursor-pointer";
        div.innerHTML = `<p class="font-medium">${topping.name}</p><p class="text-sm text-gray-500">+$${topping.price.toFixed(2)}</p>`;
        div.onclick = () => toggleTopping(index, div);
        container.appendChild(div);
      });
    }

    function toggleTopping(index, element) {
      const topping = toppingsData[index];
      const existing = order.toppings.findIndex(t => t.name === topping.name);
      
      if (existing > -1) {
        order.toppings.splice(existing, 1);
        element.classList.remove("active");
      } else {
        order.toppings.push(topping);
        element.classList.add("active");
      }
      updatePrice();
    }

    function updatePrice() {
      let total = order.sizePrice;
      order.toppings.forEach(t => total += t.price);
      document.getElementById("total-price").textContent = "$" + total.toFixed(2);
    }

    function selectSize(el, price) {
      document.querySelectorAll('.pizza-option').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      order.sizePrice = price;
      updatePrice();
    }

    function selectCrust(el, crustName) {
      document.querySelectorAll('#step-2 .pizza-option').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      order.crust = crustName;
    }

    function goToStep(step) {
      currentStep = step;
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById(`step-${step}`).classList.add('active');
    }

    function nextStep() {
      if (currentStep < 3) {
        currentStep++;
        goToStep(currentStep);
      } else {
        alert("Order Summary coming soon!\n\nTotal: " + document.getElementById("total-price").textContent);
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        currentStep--;
        goToStep(currentStep);
      }
    }

    // Enter key
    document.getElementById("password-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") checkPassword();
    });
  </script>
</body>
</html>
