<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍕 Hometown Pizza - Order</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .option-card { transition: all 0.2s; }
    .option-card.active { border-color: #dc2626; transform: scale(1.03); }
    .pizza-option { transition: all 0.2s; }
    .pizza-option.active { border-color: #dc2626; background-color: #fee2e2; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Password Screen -->
  <div id="password-screen" class="fixed inset-0 bg-black flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-xs w-full mx-4 text-center">
      <h1 class="text-4xl mb-2">🍕</h1>
      <h2 class="text-2xl font-bold mb-6">Hometown Pizza</h2>
      <h3 class="text-xl font-medium text-gray-600 mb-6">Test App</h3>
      <input type="password" id="password-input"
             class="w-full px-5 py-4 border rounded-2xl text-center text-lg mb-4"
             placeholder="Enter test password">
      <button onclick="checkPassword()"
              class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-semibold text-lg">
        Enter Test App
      </button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app" class="hidden max-w-md mx-auto bg-white min-h-screen">
   
    <!-- Header -->
    <div class="bg-red-600 text-white p-5 sticky top-0 z-10">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold">Hometown Pizza</h1>
          <p class="text-red-100 text-sm">Test App</p>
        </div>
        <div id="cart-count" class="bg-white text-red-600 w-8 h-8 flex items-center justify-center rounded-full font-bold">0</div>
      </div>
    </div>

    <div class="p-5">
      <h2 class="text-2xl font-bold mb-6">How would you like your pizza?</h2>

      <!-- Specialty Pizzas -->
      <div onclick="showSpecialty()" class="option-card border-2 border-gray-300 rounded-3xl p-5 mb-4 cursor-pointer hover:border-red-300">
        <div class="flex justify-between items-start">
          <div>
            <p class="font-bold text-lg">Specialty Pizzas</p>
            <p class="text-gray-600 text-sm">All Meat, The Works, Hot Wing, etc.</p>
            <p class="text-red-600 font-semibold mt-1">Large — $20.95</p>
          </div>
          <span class="text-5xl">🍕</span>
        </div>
      </div>

      <!-- Build Your Own -->
      <div onclick="showBuildOwn()" class="option-card border-2 border-gray-300 rounded-3xl p-5 cursor-pointer hover:border-red-300">
        <div class="flex justify-between items-start">
          <div>
            <p class="font-bold text-lg">Build Your Own</p>
            <p class="text-gray-600 text-sm">Ala Carte - Start from scratch</p>
            <p class="text-red-600 font-semibold mt-1">Large Base — $14.95</p>
          </div>
          <span class="text-5xl">🛠️</span>
        </div>
      </div>

      <div class="mt-10 text-center text-xs text-gray-500">
        Salads • Sandwiches • Drinks coming soon
      </div>
    </div>
  </div>

  <script>
    const CORRECT_PASSWORD = "pizza2026";

    function checkPassword() {
      if (document.getElementById("password-input").value === CORRECT_PASSWORD) {
        document.getElementById("password-screen").classList.add("hidden");
        document.getElementById("main-app").classList.remove("hidden");
      } else {
        alert("Wrong password");
      }
    }

    // Enter key support
    document.getElementById("password-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") checkPassword();
    });

    function showSpecialty() {
      alert("✅ Specialty Pizzas Screen\n\nComing next update!\n\nExamples:\n• All Meat - $20.95\n• The Works - $20.95\n• Hot Wing - $20.95\n• Gourmet options - $21.95");
    }

    function showBuildOwn() {
      alert("✅ Build Your Own Flow\n\nBase Price (Large): $14.95\n\nNext step: Size → Sauce → Cheese → Toppings");
    }
  </script>
</body>
</html>
